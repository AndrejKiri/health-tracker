services:
  postgres:
    image: postgres:16
    container_name: health_postgres
    # No host port binding — only reachable inside the Docker network.
    # Connect locally with: docker compose exec postgres psql -U $POSTGRES_USER -d $POSTGRES_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed_sample_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
      - frontend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.3.6
    container_name: health_ollama
    # No host port binding — only reachable inside the Docker network.
    # Before first use, pull the model:
    #   docker compose exec ollama ollama pull llama3.1:8b
    # Subsequent starts reuse the volume; no re-download needed.
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 6G
    healthcheck:
      # Use the ollama binary (always present) instead of curl (may be absent
      # in future minimal base images). `ollama list` returns exit 0 when the
      # daemon is up and its API is reachable.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: health_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/health-timeline.json
      # Expose DB connection details so datasource.yml can reference them via ${VAR}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped

  extractor:
    build: ./extractor
    container_name: health_extractor
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    # The extractor runs as UID 1001. The bind-mount directories must be
    # writable by that UID. Run once after creating them:
    #   sudo chown -R 1001:1001 data/
    volumes:
      - ./data/inbox:/data/inbox
      - ./data/processed:/data/processed
      - ./data/failed:/data/failed
      - ./db:/app/db:ro
      - ./reference_ranges.json:/app/reference_ranges.json:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      WATCH_DIR: /data/inbox
      PROCESSED_DIR: /data/processed
      FAILED_DIR: /data/failed
    deploy:
      resources:
        limits:
          # OCR (Tesseract + pdf2image) can spike to ~300–400 MB per page;
          # with MAX_WORKERS=3 concurrent jobs that approaches 1.5 GB in the
          # worst case.  2 G gives headroom without hoarding host RAM.
          memory: 2G
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  ollama_data:

# backend: extractor + ollama + postgres
# frontend: grafana + postgres
# Grafana cannot reach Ollama; extractor cannot reach Grafana.
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
